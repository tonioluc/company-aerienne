spring.application.name=aerienne

# PostgreSQL datasource
# Remplacez les valeurs 'username' et 'password' par vos identifiants locaux
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aerienne}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (optionnel — ajustez selon vos besoins)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Serveur web
server.port=${PORT:8080}

# Disable Open Session in View to avoid DB access during view rendering
spring.jpa.open-in-view=false
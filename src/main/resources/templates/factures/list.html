<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Factures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        .clickable-row { cursor: pointer; }
        .clickable-row:hover { background-color: #f0f8ff !important; }
    </style>
</head>
<body>
<div th:insert="~{sidebar}"></div>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="fa fa-file-text-o"></i> Liste des Factures Mères</h4>
        </div>
        <div class="card-body">
            <p class="text-muted mb-3">
                <i class="fa fa-info-circle"></i> Cliquez sur l'ID d'une facture pour voir les détails des diffusions associées.
            </p>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Société</th>
                            <th>Période</th>
                            <th class="text-end">Montant Total</th>
                            <th class="text-end">Montant Payé</th>
                            <th class="text-end">Reste à Payer</th>
                            <th>Statut</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="facture : ${factures}" class="clickable-row" 
                            th:onclick="'window.location.href=\'/factures/' + ${facture.idFactureMere} + '\''">
                            <td>
                                <a th:href="@{/factures/{id}(id=${facture.idFactureMere})}" class="fw-bold text-primary">
                                    #<span th:text="${facture.idFactureMere}"></span>
                                </a>
                            </td>
                            <td th:text="${facture.nomSociete}"></td>
                            <td th:text="${facture.libelle}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(facture.montantTotal, 1, 'COMMA', 2, 'POINT') + ' Ar'}"></td>
                            <td class="text-end text-success" th:text="${#numbers.formatDecimal(facture.montantPaye, 1, 'COMMA', 2, 'POINT') + ' Ar'}"></td>
                            <td class="text-end text-danger" th:text="${#numbers.formatDecimal(facture.montantRestant, 1, 'COMMA', 2, 'POINT') + ' Ar'}"></td>
                            <td>
                                <span th:if="${facture.montantRestant <= 0}" class="badge bg-success">Soldée</span>
                                <span th:if="${facture.montantRestant > 0}" class="badge bg-warning text-dark">En cours</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(factures)}">
                            <td colspan="7" class="text-center text-muted">Aucune facture trouvée</td>
                        </tr>
                    </tbody>
                    <tfoot class="table-secondary">
                        <tr>
                            <th colspan="3" class="text-end">Totaux :</th>
                            <th class="text-end" th:text="${#numbers.formatDecimal(totalMontant, 1, 'COMMA', 2, 'POINT') + ' Ar'}"></th>
                            <th class="text-end text-success" th:text="${#numbers.formatDecimal(totalPaye, 1, 'COMMA', 2, 'POINT') + ' Ar'}"></th>
                            <th class="text-end text-danger" th:text="${#numbers.formatDecimal(totalRestant, 1, 'COMMA', 2, 'POINT') + ' Ar'}"></th>
                            <th></th>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

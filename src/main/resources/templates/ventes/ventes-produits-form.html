<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vente de produits extra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        .form-help { font-size: .9rem; color: #6c757d; }
    </style>
</head>
<body>
<div th:insert="~{sidebar}"></div>
<div class="container mt-5">
    <div class="d-flex align-items-center mb-3">
        <h2 class="mb-0"><i class="fa fa-shopping-basket"></i> Vente de produits extra</h2>
    </div>

    <!-- Messages de succès/erreur -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Formulaire simple sans th:object pour éviter dépendances backend -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
            <i class="fa fa-plus"></i> Enregistrer une vente
        </div>
        <div class="card-body">
            <form th:action="@{/achats/produits-extras/ajouter}" method="post" class="row g-3">
                <div class="col-md-5">
                    <label for="idProduitExtra" class="form-label">Produit</label>
                    <select id="idProduitExtra" name="idProduitExtra" class="form-select" required th:if="${produitsExtras != null}">
                        <option value="">-- Sélectionner un produit --</option>
                        <option th:each="prod : ${produitsExtras}"
                                th:value="${prod.idProduitExtra != null ? prod.idProduitExtra : prod.id}"
                                th:text="${(prod.nom != null ? prod.nom : prod.libelle) + ' (' + #strings.replace(#numbers.formatDecimal(prod.prixUnitaire, 1, 'POINT', 0, 'COMMA'), '.', ' ') + ' Ar)'}">
                        </option>
                    </select>
                    <div th:if="${produitsExtras == null}" class="form-text text-warning">Liste des produits indisponible pour le moment.</div>
                </div>
                <div class="col-md-4">
                    <label for="idVol" class="form-label">Vol</label>
                    <select id="idVol" name="idVol" class="form-select" required>
                        <option value="">-- Sélectionner un vol --</option>
                        <option th:each="vol : ${vols}" 
                                th:value="${vol.idVol}" 
                                th:text="${vol.trajetDescription} + ' - Départ: ' + ${vol.dateHeureDepart} + ' - Arrivée: ' + ${vol.dateHeureArrive}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="quantite" class="form-label">Quantité vendue</label>
                    <input type="number" id="quantite" name="quantite" class="form-control" min="1" step="1" required>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa fa-save"></i> Enregistrer
                    </button>
                    <a th:href="@{/}" class="btn btn-secondary">
                        <i class="fa fa-arrow-left"></i> Retour
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

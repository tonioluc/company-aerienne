<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ventes produits extra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:insert="~{sidebar}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Ventes produits extra</h3>
        <a th:href="@{/ventes-produits/ajouter}" class="btn btn-primary">Nouvelle vente</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead>
            <tr>
                <th>ID</th>
                <th>Vol</th>
                <th>Produit</th>
                <th>Quantité</th>
                <th>Date vente</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${ventes}">
                <td th:text="${v.id}"></td>
                <td th:text="${v.volDescription}"></td>
                <td th:text="${v.produitNom}"></td>
                <td th:text="${v.quantite}"></td>
                <td th:text="${v.dateVente}"></td>
                <td>
                    <form th:action="@{'/ventes-produits/delete/' + ${v.id}}" method="post" style="display:inline">
                        <button class="btn btn-danger btn-sm">Supprimer</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(ventes)}">
                <td colspan="6" class="text-center text-muted">Aucune vente</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>

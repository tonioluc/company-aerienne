<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Paiements de Factures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Favicon personnalisé (logo SVG) -->
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
    <link rel="shortcut icon" href="/images/logo.svg">
</head>
<body>
<div th:insert="~{sidebar}"></div>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="fa fa-list"></i> Liste des Paiements de Factures</h4>
            <a th:href="@{/paiements-facture/ajouter}" class="btn btn-light">
                <i class="fa fa-plus"></i> Nouveau Paiement
            </a>
        </div>
        <div class="card-body">
            <!-- Messages d'alerte -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Société</th>
                            <th>Facture (Période)</th>
                            <th>Date Paiement</th>
                            <th class="text-end">Montant Payé</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="paiement, iter : ${paiements}">
                            <td th:text="${iter.count}"></td>
                            <td th:text="${paiement.nomSociete}"></td>
                            <td th:text="${paiement.libelleFacture}"></td>
                            <td th:text="${paiement.datePaiement != null ? #temporals.format(paiement.datePaiement, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(paiement.montantPaye, 1, 'COMMA', 2, 'POINT') + ' Ar'}"></td>
                            <td class="text-center">
                                <a th:href="@{/paiements-facture/supprimer/{id}(id=${paiement.idPaiementFacture})}" 
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Voulez-vous vraiment supprimer ce paiement?')">
                                    <i class="fa fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(paiements)}">
                            <td colspan="6" class="text-center text-muted">Aucun paiement enregistré</td>
                        </tr>
                    </tbody>
                    <tfoot class="table-secondary">
                        <tr>
                            <td colspan="4" class="text-end fw-bold">Total des paiements :</td>
                            <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(totalPaiements, 1, 'COMMA', 2, 'POINT') + ' Ar'}"></td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Paiements Publicitaires</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
<div th:insert="~{sidebar}"></div>
<div class="container mt-4">
    <div class="mb-4">
        <h1><i class="fa fa-money"></i> Paiements Publicitaires</h1>
    </div>

    <!-- Messages de succès/erreur -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Bouton d'ajout -->
    <div class="mb-3">
        <a th:href="@{/paiements-pub/ajouter}" class="btn btn-success">
            <i class="fa fa-plus"></i> Ajouter un paiement
        </a>
    </div>

    <!-- Tableau des paiements -->
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="fa fa-table"></i> Liste des paiements</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Date de paiement</th>
                            <th>Société</th>
                            <th class="text-end">Montant (Ar)</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="paiement, iterStat : ${paiements}">
                            <td th:text="${iterStat.count}"></td>
                            <td th:text="${#temporals.format(paiement.datePaiement, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${paiement.nomSociete}"></td>
                            <td class="text-end" th:text="${#strings.replace(#numbers.formatDecimal(paiement.montant, 1, 'POINT', 0, 'COMMA'), '.', ' ')}"></td>
                            <td class="text-center">
                                <a th:href="@{/paiements-pub/modifier/{id}(id=${paiement.idPaiementPub})}" class="btn btn-sm btn-warning">
                                    <i class="fa fa-edit"></i>
                                </a>
                                <a th:href="@{/paiements-pub/supprimer/{id}(id=${paiement.idPaiementPub})}" 
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce paiement?')">
                                    <i class="fa fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot class="table-primary" th:if="${paiements != null and !paiements.isEmpty()}">
                        <tr>
                            <th colspan="3" class="text-end">TOTAL</th>
                            <th class="text-end" th:text="${#strings.replace(#numbers.formatDecimal(totalPaiements, 1, 'POINT', 0, 'COMMA'), '.', ' ')}"></th>
                            <th></th>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <!-- Message si aucun résultat -->
    <div class="alert alert-warning mt-3" th:if="${paiements == null or paiements.isEmpty()}">
        <i class="fa fa-exclamation-triangle"></i> Aucun paiement enregistré.
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

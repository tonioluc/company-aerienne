<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paiement Publicitaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
<div th:insert="~{sidebar}"></div>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fa fa-money"></i> 
                        <span th:if="${paiement.idPaiementPub == null}">Ajouter un paiement</span>
                        <span th:if="${paiement.idPaiementPub != null}">Modifier le paiement</span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="${paiement.idPaiementPub != null} ? @{/paiements-pub/modifier/{id}(id=${paiement.idPaiementPub})} : @{/paiements-pub/ajouter}" 
                          method="post">
                        
                        <div class="mb-3">
                            <label for="idSociete" class="form-label">Société</label>
                            <select name="idSociete" class="form-select" id="idSociete" required>
                                <option value="">-- Sélectionner une société --</option>
                                <option th:each="societe : ${societes}" 
                                        th:value="${societe.idSociete}" 
                                        th:text="${societe.nom}"
                                        th:selected="${paiement.idSociete == societe.idSociete}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="datePaiement" class="form-label">Date de paiement</label>
                            <input type="datetime-local" name="datePaiement" class="form-control" id="datePaiement" 
                                   th:value="${paiement.datePaiement != null ? #temporals.format(paiement.datePaiement, 'yyyy-MM-dd''T''HH:mm') : ''}" 
                                   required/>
                        </div>

                        <div class="mb-3">
                            <label for="montant" class="form-label">Montant (Ar)</label>
                            <input type="number" step="0.01" name="montant" class="form-control" id="montant" 
                                   th:value="${paiement.montant}" 
                                   min="0" required/>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/paiements-pub}" class="btn btn-secondary">
                                <i class="fa fa-arrow-left"></i> Retour
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa fa-save"></i> Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

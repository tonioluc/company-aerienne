<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajout de diffusion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Favicon personnalisé (logo SVG) -->
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
    <link rel="shortcut icon" href="/images/logo.svg">
</head>
<body>
<div th:insert="~{sidebar}"></div>
<div class="container mt-5">
    <h2 class="mb-4">Ajouter une diffusion</h2>
    
    <!-- Messages de succès/erreur -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <form th:action="@{/diffusions/ajouter}" th:object="${diffusion}" method="post">
        <div class="mb-3">
            <label for="societe" class="form-label">Société</label>
            <select th:field="*{societe}" class="form-select" id="societe" required>
                <option value="">-- Sélectionner une société --</option>
                <option th:each="societe : ${societes}" th:value="${societe.idSociete}" th:text="${societe.nom}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="vol" class="form-label">Vol</label>
            <select th:field="*{vol}" class="form-select" id="vol" required>
                <option value="">-- Sélectionner un vol --</option>
                <option th:each="vol : ${vols}" th:value="${vol.idVol}" th:text="${vol.trajetDescription} + ' - Départ: ' + ${vol.dateHeureDepart} + ' - Arrivée: ' + ${vol.dateHeureArrive}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="nombreDiffusion" class="form-label">Nombre de diffusion</label>
            <input type="number" th:field="*{nombreDiffusion}" class="form-control" id="nombreDiffusion" min="1" required/>
        </div>
        <button type="submit" class="btn btn-primary">Ajouter</button>
        <a th:href="@{/}" class="btn btn-secondary">Retour</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${avion.Id_avion} != null ? 'Modifier Avion' : 'Créer Avion'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Favicon personnalisé (logo SVG) -->
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
    <link rel="shortcut icon" href="/images/logo.svg">
</head>
<body>
<div th:insert="~{sidebar}"></div>
<div class="container" style="max-width:720px;">
    <div class="mb-4 mt-3">
        <h1 th:text="${avion.Id_avion} != null ? 'Modifier Avion' : 'Créer Avion'"></h1>
    </div>

    <form th:action="${avion.Id_avion} != null ? @{'/avions/' + ${avion.Id_avion}} : @{/avions}" th:object="${avion}" method="post">
        <input type="hidden" th:if="${avion.Id_avion} != null" th:field="*{Id_avion}" />

        <div class="row mb-3">
            <label for="modele" class="col-sm-3 col-form-label">Modèle</label>
            <div class="col-sm-9">
                <input id="modele" type="text" class="form-control" th:field="*{modele}" required maxlength="50" placeholder="Ex: Boeing 737" />
            </div>
        </div>

        <div class="row mb-3">
            <label for="capacite" class="col-sm-3 col-form-label">Capacité</label>
            <div class="col-sm-9">
                <input id="capacite" type="number" class="form-control" th:field="*{capacite}" min="1" required placeholder="Nombre de places" />
            </div>
        </div>

        <div class="row">
            <div class="offset-sm-3 col-sm-9">
                <button type="submit" class="btn btn-primary"><i class="fa fa-save" aria-hidden="true"></i> Enregistrer</button>
                <a class="btn btn-secondary" th:href="@{/avions}"><i class="fa fa-ban" aria-hidden="true"></i> Annuler</a>
            </div>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>

</body>
</html>

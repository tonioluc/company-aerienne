<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Avions</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #f3f3f3; }
        .actions { display: flex; gap: 8px; }
    </style>
  </head>
<body>
<h1>Liste des Avions</h1>

<p>
    <a th:href="@{/avions/new}">Ajouter un avion</a>
</p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Modèle</th>
        <th>Capacité</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="avion : ${avions}">
        <td th:text="${avion.id}"></td>
        <td th:text="${avion.modele}"></td>
        <td th:text="${avion.capacite}"></td>
        <td class="actions">
            <a th:href="@{'/avions/' + ${avion.id} + '/edit'}">Éditer</a>
            <form th:action="@{'/avions/' + ${avion.id} + '/delete'}" method="post" style="display:inline;">
                <button type="submit">Supprimer</button>
            </form>
        </td>
    </tr>
    </tbody>
  </table>

</body>
</html>

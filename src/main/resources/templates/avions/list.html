<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Avions</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  </head>
<body>
<div class="container">
    <div class="page-header">
        <h1>Liste des Avions</h1>
    </div>

    <p>
        <a class="btn btn-success" th:href="@{/avions/new}">Ajouter un avion</a>
    </p>

    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead>
            <tr>
                <th>ID</th>
                <th>Modèle</th>
                <th>Capacité</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="avion : ${avions}">
                <td th:text="${avion.id}"></td>
                <td th:text="${avion.modele}"></td>
                <td th:text="${avion.capacite}"></td>
                <td>
                    <div class="btn-group" role="group">
                        <a class="btn btn-primary" th:href="@{'/avions/' + ${avion.id} + '/edit'}">Éditer</a>
                        <form th:action="@{'/avions/' + ${avion.id} + '/delete'}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Confirmer la suppression ?');">Supprimer</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>

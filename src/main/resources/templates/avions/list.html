<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Avions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  </head>
<body>
<div th:include="sidebar"></div>
<div class="container mt-4">
    <div class="mb-4">
        <h1>Liste des Avions</h1>
    </div>

    <p>
        <a class="btn btn-success" th:href="@{/avions/new}"><i class="fa fa-plus" aria-hidden="true"></i> Ajouter un avion</a>
    </p>

    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Modèle</th>
                <th>Capacité</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="avion : ${avions}">
                <td th:text="${avion.Id_avion}"></td>
                <td th:text="${avion.modele}"></td>
                <td th:text="${avion.capacite}"></td>
                <td>
                    <div class="btn-group" role="group" aria-label="Actions">
                        <a class="btn btn-primary btn-sm me-2" th:href="@{'/avions/' + ${avion.Id_avion} + '/edit'}"><i class="fa fa-pencil" aria-hidden="true"></i> Éditer</a>
                        <form th:action="@{'/avions/' + ${avion.Id_avion} + '/delete'}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Confirmer la suppression ?');"><i class="fa fa-trash" aria-hidden="true"></i> Supprimer</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

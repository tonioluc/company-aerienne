<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accueil - Gestion Aérienne</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Favicon personnalisé (logo SVG) -->
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
    <link rel="shortcut icon" href="/images/logo.svg">
</head>
<body>
<div th:insert="~{sidebar}"></div>
<div class="container mt-5">
    <div class="text-center mb-5">
        <h1><i class="fa fa-plane" aria-hidden="true"></i> Gestion Aérienne</h1>
        <p class="lead text-muted">Bienvenue sur le système de gestion des vols et achats de places</p>
    </div>

    <!-- Liens rapides (remplace filtre CA obsolète) -->
    <div class="row justify-content-center mb-5">
        <div class="col-md-10">
            <div class="card shadow-sm">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="fa fa-link"></i> Liens rapides</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <a th:href="@{/avions}" class="card h-100 text-decoration-none text-dark">
                                <div class="card-body text-center">
                                    <i class="fa fa-plane fa-2x text-primary mb-2"></i>
                                    <h6 class="card-title">Gestion Avions</h6>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a th:href="@{/valeur-maximale}" class="card h-100 text-decoration-none text-dark">
                                <div class="card-body text-center">
                                    <i class="fa fa-trophy fa-2x text-warning mb-2"></i>
                                    <h6 class="card-title">Valeur Maximale Avion</h6>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a th:href="@{/vols}" class="card h-100 text-decoration-none text-dark">
                                <div class="card-body text-center">
                                    <i class="fa fa-map fa-2x text-success mb-2"></i>
                                    <h6 class="card-title">Liste des Vols</h6>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a th:href="@{/chiffre-affaire-vol}" class="card h-100 text-decoration-none text-dark">
                                <div class="card-body text-center">
                                    <i class="fa fa-usd fa-2x text-success mb-2"></i>
                                    <h6 class="card-title">Chiffre d'affaire par vol</h6>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a th:href="@{/achats}" class="card h-100 text-decoration-none text-dark">
                                <div class="card-body text-center">
                                    <i class="fa fa-ticket fa-2x text-primary mb-2"></i>
                                    <h6 class="card-title">Acheter des Places</h6>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a th:href="@{/achats/liste}" class="card h-100 text-decoration-none text-dark">
                                <div class="card-body text-center">
                                    <i class="fa fa-list fa-2x text-secondary mb-2"></i>
                                    <h6 class="card-title">Liste des Achats</h6>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a th:href="@{/ajouter-diffusion}" class="card h-100 text-decoration-none text-dark">
                                <div class="card-body text-center">
                                    <i class="fa fa-bullhorn fa-2x text-info mb-2"></i>
                                    <h6 class="card-title">Ajouter Diffusion</h6>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a th:href="@{/chiffre-affaire-diffusion}" class="card h-100 text-decoration-none text-dark">
                                <div class="card-body text-center">
                                    <i class="fa fa-bar-chart fa-2x text-warning mb-2"></i>
                                    <h6 class="card-title">Valeur des Diffusions</h6>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a th:href="@{/factures}" class="card h-100 text-decoration-none text-dark">
                                <div class="card-body text-center">
                                    <i class="fa fa-file-text fa-2x text-danger mb-2"></i>
                                    <h6 class="card-title">Liste des Factures</h6>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Achat de places</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
<div th:include="sidebar"></div>
<div class="container" style="max-width: 760px;">
	<div class="mt-4 mb-3">
		<h1>Achat de places</h1>
	</div>

	<!-- Message d'erreur si aéroports identiques -->
	<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

	<!-- Message de succès après achat -->
	<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

	<form th:action="@{/achats}" th:object="${achat}" method="post">
		<!-- Nom complet du client -->
		<div class="row mb-3">
			<label for="clientNomComplet" class="col-sm-4 col-form-label">Nom complet du client</label>
			<div class="col-sm-8">
				<input id="clientNomComplet" th:field="*{clientNomComplet}" type="text" class="form-control" required placeholder="Ex: Jean Dupont" />
			</div>
		</div>

		<!-- Aéroport de départ -->
		<div class="row mb-3">
			<label for="aeroportDepartId" class="col-sm-4 col-form-label">Aéroport de départ</label>
			<div class="col-sm-8">
				<select id="aeroportDepartId" th:field="*{aeroportDepartId}" class="form-select" required>
					<option value="" disabled selected>Choisir un aéroport</option>
					<option th:each="a : ${aeroports}"
							th:value="${a.idAeroport}"
							th:text="${a.codeIATA}"></option>
				</select>
			</div>
		</div>

		<!-- Aéroport d'arrivée -->
		<div class="row mb-3">
			<label for="aeroportArriveId" class="col-sm-4 col-form-label">Aéroport d'arrivée</label>
			<div class="col-sm-8">
				<select id="aeroportArriveId" th:field="*{aeroportArriveId}" class="form-select" required>
					<option value="" disabled selected>Choisir un aéroport</option>
					<option th:each="a : ${aeroports}"
							th:value="${a.idAeroport}"
							th:text="${a.codeIATA}"></option>
				</select>
			</div>
		</div>

		<!-- Nombre de places à prendre -->
		<div class="row mb-3">
			<label for="places" class="col-sm-4 col-form-label">Places à prendre</label>
			<div class="col-sm-8">
				<input id="places" th:field="*{places}" type="number" min="1" class="form-control" required placeholder="Ex: 2" />
			</div>
		</div>

		<!-- Classe de place -->
		<div class="row mb-3">
			<label for="classePlace" class="col-sm-4 col-form-label">Classe</label>
			<div class="col-sm-8">
				<select id="classePlace" th:field="*{idClassePlace}" class="form-select" required>
					<option value="" disabled selected>Choisir une classe</option>
					<option th:each="c : ${classes}"
						th:value="${c.idClassePlace}"
						th:text="${c.libelle}"></option>
				</select>
			</div>
		</div>

		<div class="row">
			<div class="offset-sm-4 col-sm-8">
				<button type="submit" class="btn btn-primary">Valider l'achat</button>
				<a class="btn btn-secondary" th:href="@{/}">Annuler</a>
			</div>
		</div>
	</form>
    
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 </div>
</body>
</html>

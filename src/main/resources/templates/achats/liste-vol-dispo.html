<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Vols disponibles</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		.table thead th { white-space: nowrap; }
	</style>
    
</head>
<body>
<div class="container mt-4">
	<div class="mb-4 d-flex align-items-center justify-content-between">
		<h1 class="h3 mb-0">Vols disponibles</h1>
		<a class="btn btn-secondary" th:href="@{/}"><i class="fa fa-arrow-left"></i> Annuler</a>
	</div>

	<div class="alert alert-info" th:if="${clientNom}">
		<strong>Client :</strong> <span th:text="${clientNom}"></span> &mdash;
		<strong>Places demandées :</strong> <span th:text="${placeDemandee}"></span>
	</div>

	<div class="alert alert-warning" th:if="${#maps.isEmpty(volsDisponibles)}">
		Aucun vol disponible pour les critères sélectionnés.
	</div>

	<div class="table-responsive" th:if="${!#maps.isEmpty(volsDisponibles)}">
		<table class="table table-bordered table-striped align-middle">
			<thead class="table-light">
			<tr>
				<th>Date & heure départ</th>
				<th>Date & heure arrivée</th>
				<th>Places disponibles</th>
				<th>Action</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="entry : ${volsDisponibles}">
				<td th:text="${#temporals.format(entry.key.dateHeureDepart, 'yyyy-MM-dd HH:mm')}"></td>
				<td th:text="${#temporals.format(entry.key.dateHeureArrive, 'yyyy-MM-dd HH:mm')}"></td>
				<td th:text="${entry.value}"></td>
				<td>
					<a class="btn btn-primary btn-sm" 
					   th:href="@{/achats/prendre/{idVol}(idVol=${entry.key.idVol})}">
						<i class="fa fa-ticket"></i> Prendre
					</a>
				</td>
			</tr>
			</tbody>
		</table>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
